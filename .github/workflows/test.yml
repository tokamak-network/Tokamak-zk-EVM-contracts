name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  bridge-unit-tests:
    name: Bridge Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Show Forge version
        run: forge --version

      - name: Run bridge unit tests
        run: npm run test:bridge:unit

  private-state-cli-e2e:
    name: Private-State CLI E2E
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: bridge-unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Show toolchain versions
        run: |
          node --version
          npm --version
          forge --version
          cast --version
          anvil --version

      - name: Install Tokamak zk-EVM Artifacts
        env:
          TOKAMAK_ALCHEMY_RPC_URL: ${{ secrets.TOKAMAK_ALCHEMY_RPC_URL }}
        run: |
          if [ -z "${TOKAMAK_ALCHEMY_RPC_URL}" ]; then
            echo "Missing required GitHub secret: TOKAMAK_ALCHEMY_RPC_URL" >&2
            exit 1
          fi
          rm -rf submodules/Tokamak-zk-EVM/dist
          (
            cd submodules/Tokamak-zk-EVM
            ./tokamak-cli --install "${TOKAMAK_ALCHEMY_RPC_URL}"
          )

      - name: Run private-state bridge CLI end-to-end test
        run: npm run test:private-state:cli-e2e
