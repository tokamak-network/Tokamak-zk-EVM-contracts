name: Publish private DApp packages

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/publish-private-dapp-packages.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'RELEASING.md'
      - 'scripts/npm-publish-version-decision.mjs'
      - 'scripts/release-readiness.cjs'
      - 'packages/common/**'
      - 'packages/groth16/**'
      - 'packages/apps/private-state/cli/**'

permissions:
  id-token: write
  contents: read

jobs:
  publish-common:
    name: Publish @tokamak-private-dapps/common-library to npm
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Compare package version with npm
        id: version-check
        shell: bash
        run: node scripts/npm-publish-version-decision.mjs packages/common/package.json >> "$GITHUB_OUTPUT"

      - name: Show version decision
        run: |
          echo "Package: ${{ steps.version-check.outputs.package_name }}"
          echo "Local version: ${{ steps.version-check.outputs.local_version }}"
          echo "Published version: ${{ steps.version-check.outputs.published_version }}"
          echo "Should publish: ${{ steps.version-check.outputs.should_publish }}"

      - name: Validate common release readiness
        if: steps.version-check.outputs.should_publish == 'true'
        working-directory: packages/common
        run: npm run release:check

      - name: Show common release notes
        if: steps.version-check.outputs.should_publish == 'true'
        working-directory: packages/common
        run: |
          echo "## ${{ steps.version-check.outputs.package_name }} ${{ steps.version-check.outputs.local_version }}" >> "$GITHUB_STEP_SUMMARY"
          npm run release:check -- --print-current-notes >> "$GITHUB_STEP_SUMMARY"

      - name: Validate npm package contents
        if: steps.version-check.outputs.should_publish == 'true'
        working-directory: packages/common
        run: npm publish --dry-run --access public --ignore-scripts

      - name: Publish to npm
        if: steps.version-check.outputs.should_publish == 'true'
        working-directory: packages/common
        run: npm publish --access public --ignore-scripts

  publish-groth16:
    name: Publish @tokamak-private-dapps/groth16 to npm
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Compare package version with npm
        id: version-check
        shell: bash
        run: node scripts/npm-publish-version-decision.mjs packages/groth16/package.json >> "$GITHUB_OUTPUT"

      - name: Show version decision
        run: |
          echo "Package: ${{ steps.version-check.outputs.package_name }}"
          echo "Local version: ${{ steps.version-check.outputs.local_version }}"
          echo "Published version: ${{ steps.version-check.outputs.published_version }}"
          echo "Should publish: ${{ steps.version-check.outputs.should_publish }}"

      - name: Validate Groth16 release readiness
        if: steps.version-check.outputs.should_publish == 'true'
        working-directory: packages/groth16
        run: npm run release:check

      - name: Validate Groth16 CRS version
        if: steps.version-check.outputs.should_publish == 'true'
        working-directory: packages/groth16
        run: npm run crs:check-version

      - name: Show Groth16 release notes
        if: steps.version-check.outputs.should_publish == 'true'
        working-directory: packages/groth16
        run: |
          echo "## ${{ steps.version-check.outputs.package_name }} ${{ steps.version-check.outputs.local_version }}" >> "$GITHUB_STEP_SUMMARY"
          npm run release:check -- --print-current-notes >> "$GITHUB_STEP_SUMMARY"

      - name: Validate npm package contents
        if: steps.version-check.outputs.should_publish == 'true'
        working-directory: packages/groth16
        run: npm publish --dry-run --access public --ignore-scripts

      - name: Publish to npm
        if: steps.version-check.outputs.should_publish == 'true'
        working-directory: packages/groth16
        run: npm publish --access public --ignore-scripts

  publish-private-state-cli:
    name: Publish @tokamak-private-dapps/private-state-cli to npm
    runs-on: ubuntu-22.04
    needs:
      - publish-common
      - publish-groth16

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Compare package version with npm
        id: version-check
        shell: bash
        run: node scripts/npm-publish-version-decision.mjs packages/apps/private-state/cli/package.json >> "$GITHUB_OUTPUT"

      - name: Show version decision
        run: |
          echo "Package: ${{ steps.version-check.outputs.package_name }}"
          echo "Local version: ${{ steps.version-check.outputs.local_version }}"
          echo "Published version: ${{ steps.version-check.outputs.published_version }}"
          echo "Should publish: ${{ steps.version-check.outputs.should_publish }}"

      - name: Validate private-state CLI release readiness
        if: steps.version-check.outputs.should_publish == 'true'
        working-directory: packages/apps/private-state/cli
        run: npm run release:check

      - name: Show private-state CLI release notes
        if: steps.version-check.outputs.should_publish == 'true'
        working-directory: packages/apps/private-state/cli
        run: |
          echo "## ${{ steps.version-check.outputs.package_name }} ${{ steps.version-check.outputs.local_version }}" >> "$GITHUB_STEP_SUMMARY"
          npm run release:check -- --print-current-notes >> "$GITHUB_STEP_SUMMARY"

      - name: Validate npm package contents
        if: steps.version-check.outputs.should_publish == 'true'
        working-directory: packages/apps/private-state/cli
        run: npm publish --dry-run --access public --ignore-scripts

      - name: Publish to npm
        if: steps.version-check.outputs.should_publish == 'true'
        working-directory: packages/apps/private-state/cli
        run: npm publish --access public --ignore-scripts
