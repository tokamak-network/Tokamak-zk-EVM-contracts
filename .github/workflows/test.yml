name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  bridge-unit-tests:
    name: Bridge Unit Tests
    if: github.event_name != 'pull_request' || (github.head_ref != 'main' && github.head_ref != 'dev')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Show Forge version
        run: forge --version

      - name: Run bridge unit tests
        run: npm run test:bridge:unit

  private-state-cli-e2e:
    name: Private-State CLI E2E
    if: github.event_name != 'pull_request' || (github.head_ref != 'main' && github.head_ref != 'dev')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: bridge-unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies for Tokamak toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev cmake dos2unix

      - name: Install Circom
        run: |
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT
          git clone --depth 1 --branch v2.2.2 https://github.com/iden3/circom.git "${tmp_dir}/circom"
          (
            cd "${tmp_dir}/circom"
            cargo build --release
            sudo install -m 0755 target/release/circom /usr/local/bin/circom
          )
          circom --version

      - name: Install npm dependencies
        run: npm ci

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Show toolchain versions
        run: |
          node --version
          npm --version
          circom --version
          forge --version
          cast --version
          anvil --version

      - name: Install Tokamak zk-EVM Artifacts
        env:
          TOKAMAK_ALCHEMY_API_KEY: ${{ secrets.TOKAMAK_ALCHEMY_API_KEY }}
        run: |
          if [ -z "${TOKAMAK_ALCHEMY_API_KEY}" ]; then
            echo "Missing required GitHub secret: TOKAMAK_ALCHEMY_API_KEY" >&2
            exit 1
          fi
          rm -rf submodules/Tokamak-zk-EVM/dist
          (
            cd submodules/Tokamak-zk-EVM
            ./tokamak-cli --install "${TOKAMAK_ALCHEMY_API_KEY}"
          )

      - name: Run private-state bridge CLI end-to-end test
        run: npm run test:private-state:cli-e2e
