name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  bridge-unit-tests:
    name: Bridge Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Show Forge version
        run: forge --version

      - name: Run bridge unit tests
        run: npm run test:bridge:unit

  private-state-cli-e2e:
    name: Private-State CLI E2E
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    needs: bridge-unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies for Tokamak toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            curl \
            wget \
            make \
            build-essential \
            python3 \
            zip \
            unzip \
            pkg-config \
            libssl-dev \
            jq \
            git-lfs \
            cmake \
            dos2unix
          git lfs install --skip-repo

      - name: Install Circom
        run: |
          wget https://github.com/iden3/circom/releases/download/v2.2.2/circom-linux-amd64
          chmod +x circom-linux-amd64
          sudo mv circom-linux-amd64 /usr/local/bin/circom
          circom --version

      - name: Install npm dependencies
        run: npm ci

      - name: Install Tokamak root npm dependencies
        run: npm ci --prefix submodules/Tokamak-zk-EVM

      - name: Install Groth16 circuit dependencies
        run: npm ci --prefix groth16/circuits

      - name: Verify Groth16 circuit tooling
        run: |
          test -x groth16/circuits/node_modules/.bin/snarkjs
          groth16/circuits/node_modules/.bin/snarkjs g16v --help >/dev/null

      - name: Make Tokamak scripts executable
        run: |
          chmod +x submodules/Tokamak-zk-EVM/tokamak-cli
          chmod +x submodules/Tokamak-zk-EVM/scripts/tokamak-cli-core

      - name: Install Tokamak frontend dependencies
        run: |
          cd submodules/Tokamak-zk-EVM/packages/frontend/qap-compiler
          npm install --legacy-peer-deps
          cd ../synthesizer
          npm install --legacy-peer-deps

      - name: Install tsx
        run: npm install -g tsx

      - name: Verify Tokamak install prerequisites
        run: |
          for cmd in \
            git \
            curl \
            wget \
            tar \
            unzip \
            make \
            jq \
            git-lfs \
            node \
            npm \
            python3 \
            bun \
            rustc \
            cargo \
            cmake \
            dos2unix \
            circom \
            tsx; do
            command -v "${cmd}" >/dev/null 2>&1 || {
              echo "Missing required command: ${cmd}" >&2
              exit 1
            }
          done

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Show toolchain versions
        run: |
          node --version
          npm --version
          bun --version
          rustc --version
          cargo --version
          git --version
          curl --version | head -n 1
          wget --version | head -n 1
          tar --version | head -n 1
          unzip -v | head -n 1
          jq --version
          git-lfs version
          cmake --version | head -n 1
          dos2unix --version | head -n 1
          circom --version
          tsx --version
          forge --version
          cast --version
          anvil --version

      - name: Install Tokamak zk-EVM Artifacts
        run: |
          rm -rf submodules/Tokamak-zk-EVM/dist
          (
            cd submodules/Tokamak-zk-EVM
            find . -name "*.sh" -exec chmod +x {} \;
            find . -name "*.sh" -exec dos2unix {} \; 2>/dev/null || true
            ./tokamak-cli --install --bun
          )
          rm -f submodules/Tokamak-zk-EVM/dist/bin/synthesizer

      - name: Run private-state bridge CLI end-to-end test
        run: |
          bash scripts/ci/run-with-memory-monitor.sh \
            --log-dir apps/private-state/scripts/e2e/output/private-state-bridge-cli/system-monitor \
            -- \
            npm run test:private-state:cli-e2e

      - name: Upload private-state CLI failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: private-state-cli-e2e-failure-diagnostics
          if-no-files-found: warn
          path: |
            apps/private-state/scripts/e2e/output/private-state-bridge-cli/failure-diagnostics.json
            apps/private-state/scripts/e2e/output/private-state-bridge-cli/summary.json
            apps/private-state/scripts/e2e/output/private-state-bridge-cli/**
            ${{ env.HOME }}/tokamak-private-channels/workspace/anvil/private-state-cli-e2e/channel/current/**
            ${{ env.HOME }}/tokamak-private-channels/workspace/anvil/private-state-cli-e2e/channel/operations/**
            ${{ env.HOME }}/tokamak-private-channels/workspace/anvil/private-state-cli-e2e/wallets/**/operations/**
