[profile.default]
src = "src"
test = "test"
out = "out"
libs = ["../lib"]
remappings = [
    "@openzeppelin/=../lib/openzeppelin-contracts/contracts/",
    "@openzeppelin-upgradeable/=../lib/openzeppelin-contracts-upgradeable/contracts/",
    "forge-std/=../lib/forge-std/src/",
]

optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "prague"
fs_permissions = [
    { access = "read", path = "./test/fixtures" },
    { access = "read", path = "../tokamak-zkp/test/fixtures" },
    { access = "read", path = "./deployments" },
    { access = "read", path = "../deployment" },
    { access = "write", path = "./deployments" },
    { access = "write", path = "../deployment" },
]

[profile.ci]
src = "src"
test = "test"
out = "out"
libs = ["../lib"]
remappings = [
    "@openzeppelin/=../lib/openzeppelin-contracts/contracts/",
    "@openzeppelin-upgradeable/=../lib/openzeppelin-contracts-upgradeable/contracts/",
    "forge-std/=../lib/forge-std/src/",
]

optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "prague"
fs_permissions = [
    { access = "read", path = "./test/fixtures" },
    { access = "read", path = "../tokamak-zkp/test/fixtures" },
    { access = "read", path = "./deployments" },
    { access = "read", path = "../deployment" },
    { access = "write", path = "./deployments" },
    { access = "write", path = "../deployment" },
]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
