name: Publish private DApp packages

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/publish-private-dapp-packages.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'RELEASING.md'
      - 'scripts/release-readiness.cjs'
      - 'packages/common/**'
      - 'packages/groth16/**'

permissions:
  id-token: write
  contents: read

jobs:
  publish-private-dapp-packages:
    name: Publish private DApp packages to npm
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Compare package versions with npm
        id: version-check
        shell: bash
        run: |
          node <<'EOF_NODE' >> "$GITHUB_OUTPUT"
          const { execSync } = require('node:child_process');

          const packageEntries = [
            {
              outputPrefix: 'common',
              manifestPath: './packages/common/package.json',
            },
            {
              outputPrefix: 'groth16',
              manifestPath: './packages/groth16/package.json',
            },
          ];

          function compareSemver(left, right) {
            const leftParts = left.split('.').map((value) => Number(value));
            const rightParts = right.split('.').map((value) => Number(value));
            const maxLength = Math.max(leftParts.length, rightParts.length);

            for (let index = 0; index < maxLength; index += 1) {
              const leftValue = leftParts[index] ?? 0;
              const rightValue = rightParts[index] ?? 0;
              if (leftValue > rightValue) return 1;
              if (leftValue < rightValue) return -1;
            }

            return 0;
          }

          let publishCount = 0;
          for (const entry of packageEntries) {
            const manifest = require(entry.manifestPath);
            if (manifest.private === true) {
              throw new Error(`${manifest.name} is marked private and cannot be published.`);
            }

            let publishedVersion = null;
            try {
              publishedVersion = execSync(`npm view "${manifest.name}" version`, {
                encoding: 'utf8',
                stdio: ['ignore', 'pipe', 'pipe'],
              }).trim();
            } catch (error) {
              publishedVersion = null;
            }

            const comparison =
              publishedVersion === null ? 1 : compareSemver(manifest.version, publishedVersion);
            if (comparison < 0) {
              throw new Error(
                `Local version ${manifest.version} is behind npm version ${publishedVersion} for ${manifest.name}.`,
              );
            }

            const shouldPublish = publishedVersion === null || comparison > 0;
            if (shouldPublish) {
              publishCount += 1;
            }

            console.log(`${entry.outputPrefix}_package_name=${manifest.name}`);
            console.log(`${entry.outputPrefix}_local_version=${manifest.version}`);
            console.log(`${entry.outputPrefix}_published_version=${publishedVersion ?? 'none'}`);
            console.log(`${entry.outputPrefix}_should_publish=${shouldPublish}`);
          }

          console.log(`publish_count=${publishCount}`);
          console.log(`should_publish_any=${publishCount > 0}`);
          EOF_NODE

      - name: Show version decision
        run: |
          echo "Common package: ${{ steps.version-check.outputs.common_package_name }}"
          echo "Common local version: ${{ steps.version-check.outputs.common_local_version }}"
          echo "Common published version: ${{ steps.version-check.outputs.common_published_version }}"
          echo "Common should publish: ${{ steps.version-check.outputs.common_should_publish }}"
          echo "Groth16 package: ${{ steps.version-check.outputs.groth16_package_name }}"
          echo "Groth16 local version: ${{ steps.version-check.outputs.groth16_local_version }}"
          echo "Groth16 published version: ${{ steps.version-check.outputs.groth16_published_version }}"
          echo "Groth16 should publish: ${{ steps.version-check.outputs.groth16_should_publish }}"

      - name: Validate common release readiness
        if: steps.version-check.outputs.common_should_publish == 'true'
        working-directory: packages/common
        run: npm run release:check

      - name: Show common release notes
        if: steps.version-check.outputs.common_should_publish == 'true'
        working-directory: packages/common
        run: |
          echo "## ${{ steps.version-check.outputs.common_package_name }} ${{ steps.version-check.outputs.common_local_version }}" >> "$GITHUB_STEP_SUMMARY"
          npm run release:check -- --print-current-notes >> "$GITHUB_STEP_SUMMARY"

      - name: Validate common npm package contents
        if: steps.version-check.outputs.common_should_publish == 'true'
        working-directory: packages/common
        run: npm publish --dry-run --access public --ignore-scripts

      - name: Publish common package to npm
        if: steps.version-check.outputs.common_should_publish == 'true'
        working-directory: packages/common
        run: npm publish --access public --ignore-scripts

      - name: Validate Groth16 release readiness
        if: steps.version-check.outputs.groth16_should_publish == 'true'
        working-directory: packages/groth16
        run: npm run release:check

      - name: Show Groth16 release notes
        if: steps.version-check.outputs.groth16_should_publish == 'true'
        working-directory: packages/groth16
        run: |
          echo "## ${{ steps.version-check.outputs.groth16_package_name }} ${{ steps.version-check.outputs.groth16_local_version }}" >> "$GITHUB_STEP_SUMMARY"
          npm run release:check -- --print-current-notes >> "$GITHUB_STEP_SUMMARY"

      - name: Validate Groth16 npm package contents
        if: steps.version-check.outputs.groth16_should_publish == 'true'
        working-directory: packages/groth16
        run: npm publish --dry-run --access public --ignore-scripts

      - name: Publish Groth16 package to npm
        if: steps.version-check.outputs.groth16_should_publish == 'true'
        working-directory: packages/groth16
        run: npm publish --access public --ignore-scripts
